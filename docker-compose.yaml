services:
  isaac-sim:
    build:
      context: ./isaac-sim
      dockerfile: Dockerfile
    image: isaac-sim-stream:5.1.0
    container_name: isaac-sim
    runtime: nvidia
    shm_size: "32gb"
    environment:
      ACCEPT_EULA: "Y"
      PRIVACY_CONSENT: "Y"
      NVIDIA_VISIBLE_DEVICES: "all"
      ROS_DOMAIN_ID: "0"
      ROS_DISTRO: "jazzy"
      RMW_IMPLEMENTATION: "rmw_fastrtps_cpp"

      # Native streaming
      SIGNAL_PORT: "49100"
      STREAM_PORT: "47998"

      # WebRTC / browser access
      WEBRTC_HTTP_PORT: "8211"

      WIDTH: "1920"
      HEIGHT: "1080"
      TARGET_FPS: "60"

      # 다중 NIC 또는 외부 접속 시 명시
      # 예: PUBLIC_IP=192.168.0.51
      PUBLIC_IP: "203.255.15.92"

    ports:
      - "8211:8211/tcp"
      - "49100:49100/tcp"
      - "47998:47998/udp"

    volumes:
      - ./isaac-sim/volumes/logs:/isaac-sim/.nvidia-omniverse/logs
      - ./isaac-sim/volumes/cache:/isaac-sim/.cache
      - ./isaac-sim/volumes/data:/isaac-sim/.local/share/ov/data
      - ./isaac-sim/volumes/config:/isaac-sim/.config
      - ./isaac-sim/volumes/documents:/isaac-sim/Documents

    stdin_open: true
    tty: true
    restart: unless-stopped

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  ros2:
    build:
      context: ./ros2
      dockerfile: Dockerfile
    image: ros2-jazzy:latest
    container_name: ros2
    environment:
      ROS_DOMAIN_ID: "0"
      RMW_IMPLEMENTATION: "rmw_fastrtps_cpp"
    volumes:
      - ./ros2/volumes:/ros2_ws
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]
    restart: unless-stopped