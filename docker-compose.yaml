services:
  isaac-sim:
    container_name: isaac-sim
    image: isaac-sim-stream:5.1.0
    build:
      context: ./isaac-sim
      dockerfile: Dockerfile

    # Isaac Sim은 마운트된 캐시/데이터 디렉터리에 쓰기 권한이 필요하다.
    user: "0:0"
    runtime: nvidia
    network_mode: host
    shm_size: "64gb"

    environment:
      ACCEPT_EULA: "Y"
      PRIVACY_CONSENT: "Y"
      NVIDIA_VISIBLE_DEVICES: "all"

      ROS_DOMAIN_ID: "0"
      ROS_LOCALHOST_ONLY: "0"
      RMW_IMPLEMENTATION: "rmw_fastrtps_cpp"
      ROS_DISTRO: "jazzy"

      WIDTH: "1920"
      HEIGHT: "1080"
      TARGET_FPS: "60"
      PUBLIC_IP: "203.255.15.92"

    volumes:
      - ./isaac-sim/volumes/logs:/isaac-sim/.nvidia-omniverse/logs
      - ./isaac-sim/volumes/cache:/isaac-sim/.cache
      - ./isaac-sim/volumes/assets:/isaac-sim/.local/share/ov/data
      - ./isaac-sim/volumes/config:/isaac-sim/.config
      - ./isaac-sim/volumes/documents:/isaac-sim/Documents

    stdin_open: true
    tty: true
    restart: unless-stopped

  ros2:
    container_name: ros2
    image: ros2-jazzy:latest
    build:
      context: ./ros2
      dockerfile: Dockerfile

    # ROS2 워크스페이스는 호스트 파일을 다루므로 호스트 UID/GID를 우선 사용한다.
    user: "${UID:-1000}:${GID:-1000}"
    network_mode: host

    environment:
      ROS_DOMAIN_ID: "0"
      ROS_LOCALHOST_ONLY: "0"
      RMW_IMPLEMENTATION: "rmw_fastrtps_cpp"

    volumes:
      - ./ros2/src:/ros2_ws/src
      - ros2_build:/ros2_ws/build
      - ros2_install:/ros2_ws/install
      - ros2_log:/ros2_ws/log

    command: ["/bin/bash"]
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  ros2_build:
  ros2_install:
  ros2_log: