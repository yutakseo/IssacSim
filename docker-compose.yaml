services:
  isaac-sim:
    build:
      context: ./isaac-sim
      dockerfile: Dockerfile
    image: isaac-sim-stream:5.1.0
    container_name: isaac-sim
    runtime: nvidia
    network_mode: host
    shm_size: "32gb"
    environment:
      ACCEPT_EULA: "Y"
      NVIDIA_VISIBLE_DEVICES: "all"
      SIGNAL_PORT: "49100"
      STREAM_PORT: "47998"
      WIDTH: "2560"
      HEIGHT: "1440"
      TARGET_FPS: "60"
      # PUBLIC_IP: ""  # NAT/다중 NIC 시 설정 (예: "192.168.0.10")
    volumes:
      - ./isaac-sim/volumes/cache:/root/.cache
      - ./isaac-sim/volumes/nv:/root/.nv
      - ./isaac-sim/volumes/logs:/root/.nvidia-omniverse/logs
      - ./isaac-sim/volumes/data:/root/.local/share/ov
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ros2:
    build:
      context: ./ros2
      dockerfile: Dockerfile
    image: ros2-jazzy:latest
    container_name: ros2
    network_mode: host
    environment:
      ROS_DOMAIN_ID: "0"
      RMW_IMPLEMENTATION: "rmw_fastrtps_cpp"
    volumes:
      - ./ros2/volumes:/ros2_ws
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]
